<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer white petals -->
  <g fill="#ffffff" stroke="#f0f0f0" stroke-width="1">
    <!-- Top petal -->
    <ellipse cx="50" cy="20" rx="8" ry="18" />
    <!-- Top-right petal -->
    <ellipse cx="70" cy="27" rx="8" ry="18" transform="rotate(45 70 27)" />
    <!-- Right petal -->
    <ellipse cx="80" cy="50" rx="8" ry="18" transform="rotate(90 80 50)" />
    <!-- Bottom-right petal -->
    <ellipse cx="70" cy="73" rx="8" ry="18" transform="rotate(135 70 73)" />
    <!-- Bottom petal -->
    <ellipse cx="50" cy="80" rx="8" ry="18" />
    <!-- Bottom-left petal -->
    <ellipse cx="30" cy="73" rx="8" ry="18" transform="rotate(-135 30 73)" />
    <!-- Left petal -->
    <ellipse cx="20" cy="50" rx="8" ry="18" transform="rotate(-90 20 50)" />
    <!-- Top-left petal -->
    <ellipse cx="30" cy="27" rx="8" ry="18" transform="rotate(-45 30 27)" />
  </g>

  <!-- Yellow center -->
  <circle cx="50" cy="50" r="15" fill="#FFD700" />

  <!-- Center details for depth -->
  <circle cx="50" cy="50" r="15" fill="#FFA500" opacity="0.3" />
  <circle cx="48" cy="48" r="3" fill="#FFED4E" opacity="0.8" />
</svg>
